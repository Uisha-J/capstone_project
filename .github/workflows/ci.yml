name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tools (Linux SQLCipher headers)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests
        continue-on-error: true   # 초기 단계: 경고만, 실패 안 시킴

      - name: Run tests
        env:
          AISLOP_DB_KEY: ci-test-passphrase-do-not-reuse
        run: |
          pytest -q --tb=short \
                 --ignore=tests/test_synthetic_malicious.py \
                 --ignore=tests/test_47_indicators.py
        # 위 두 개는 임베딩 캐시 / 출력 컨벤션 의존 — CI 별도 step 으로 추후

  security-scan:
    name: dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit project deps
        run: pip-audit -r <(pip install -e . --dry-run --quiet 2>/dev/null && pip freeze)
        continue-on-error: true

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
