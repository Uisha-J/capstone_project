name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install build tools (Linux SQLCipher headers)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Run tests
        env:
          AISLOP_DB_KEY: ci-test-passphrase-do-not-reuse
        run: |
          pytest -q --tb=short \
                 --ignore=tests/test_synthetic_malicious.py \
                 --ignore=tests/test_47_indicators.py
        # 위 두 개는 def main() 형태의 데모 스크립트 — pytest collect 0 items.
        # 별도 PR (T-2) 에서 examples/ 로 이동 또는 def test_*() 로 재작성 예정.

  security-scan:
    name: dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit project deps + gate (block on HIGH/CRITICAL only)
        run: |
          pip install -e . --quiet
          # JSON 출력 → audit_gate.py 가 severity 임계로 차단 결정
          pip-audit --format json --output audit.json || true
          python scripts/audit_gate.py audit.json

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
