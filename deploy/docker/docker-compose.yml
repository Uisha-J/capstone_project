# pkgsentinel — compose 스택.
#
# 사용:
#   1) .env 작성 (deploy/docker/.env.example 참고)
#   2) docker compose -f deploy/docker/docker-compose.yml up -d
#   3) curl http://localhost:8787/healthz
#
# 한 머신에서 server + worker 동시 실행. data volume 은 공유.

version: "3.9"

services:
  pkgsentinel-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    image: pkgsentinel-server:latest
    container_name: pkgsentinel-server
    restart: unless-stopped
    ports:
      - "${PKGSENTINEL_PORT:-8787}:8787"
    environment:
      AISLOP_DB_KEY:            "${AISLOP_DB_KEY:?missing AISLOP_DB_KEY}"
      PKGSENTINEL_HMAC_SECRET:  "${PKGSENTINEL_HMAC_SECRET:?missing HMAC secret}"
      ANTHROPIC_API_KEY:        "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY:           "${OPENAI_API_KEY:-}"
      PKGSENTINEL_BIND:         "0.0.0.0"
      PKGSENTINEL_PORT:         "8787"
    volumes:
      - pkgsentinel-data:/var/lib/pkgsentinel
      - pkgsentinel-logs:/var/log/pkgsentinel
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8787/readyz', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 보안 — read-only rootfs + tmpfs
    read_only: true
    tmpfs:
      - /tmp
      - /home/pkgsentinel/.cache
    security_opt:
      - no-new-privileges:true

volumes:
  pkgsentinel-data:
  pkgsentinel-logs:
